name: Build, package and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Verify and build web app
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

      - name: Build for GitHub Pages
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload web build
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request'
    needs: web
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy web app
        id: deployment
        uses: actions/deploy-pages@v4

  electron:
    name: Electron installer (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
          - platform: macos
            runner: macos-latest
          - platform: windows
            runner: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web runtime
        run: npm run build

      - name: Package Electron application
        run: npm run package:desktop:nobuild -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: edinburgh-gardens-2030-${{ matrix.platform }}
          path: |
            release/desktop/*.AppImage
            release/desktop/*.dmg
            release/desktop/*.exe
            release/desktop/*.zip
          if-no-files-found: error
          retention-days: 14
